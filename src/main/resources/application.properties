spring.datasource.name=student
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/store?useUnicode=\
true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&autoReconnec\
t=true&useSSL=false&allowMultiQueries=true&useAffectedRows=true
