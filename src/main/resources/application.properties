spring.datasource.password=1263447196
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Redis配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=5000

# Redis连接池优化 - 提高并发性能
spring.redis.lettuce.pool.max-active=32
spring.redis.lettuce.pool.max-wait=1000
spring.redis.lettuce.pool.max-idle=16
spring.redis.lettuce.pool.min-idle=8

# Redis通用配置
spring.redis.connect-timeout=2000
spring.redis.retry.max-attempts=3
spring.redis.retry.initial-interval=1000
spring.redis.retry.multiplier=1.1
spring.redis.retry.max-interval=3000

